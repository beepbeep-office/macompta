    <script type="text/babel">
        const { useState, useEffect } = React;
        const { jsPDF } = window.jspdf;

        // ============================================================
        //  CONFIGURATION FIREBASE
        //  → Remplacez ces valeurs par celles de votre projet Firebase
        // ============================================================
        const firebaseConfig = {
		apiKey: "AIzaSyCm5LOOFiMrKTpSJp1uG8waRoeeQD_hMPs",
		authDomain: "comptabilite-pro.firebaseapp.com",
		projectId: "comptabilite-pro",
		storageBucket: "comptabilite-pro.firebasestorage.app",
		messagingSenderId: "263135333813",
		appId: "1:263135333813:web:2934856cd01fca63815dfc"
        };

        // Initialisation Firebase
        firebase.initializeApp(firebaseConfig);
        const db   = firebase.firestore();
        const auth = firebase.auth();

        // ============================================================
        //  LISTE BLANCHE DES EMAILS AUTORISÉS
        //  → Ajoutez ici les adresses email de vous et votre collègue
        // ============================================================
        const EMAILS_AUTORISES = [
            "sebastien.blervacque@gmail.com",
            "jjrochat@orange.fr"
        ];

        // Couche d'abstraction identique à l'ancienne API localStorage
        // Les données sont stockées dans la collection "comptabilite"
        // Document par clé, champ "value" contenant la valeur JSON
        window.storage = {
            async get(key) {
                try {
                    const doc = await db.collection('comptabilite').doc(key).get();
                    if (!doc.exists) return null;
                    return { key, value: doc.data().value };
                } catch (e) {
                    console.error('Firebase get error:', e);
                    return null;
                }
            },
            async set(key, value) {
                try {
                    await db.collection('comptabilite').doc(key).set({ value });
                    return { key, value };
                } catch (e) {
                    console.error('Firebase set error:', e);
                    return null;
                }
            },
            async delete(key) {
                try {
                    await db.collection('comptabilite').doc(key).delete();
                    return { key, deleted: true };
                } catch (e) {
                    console.error('Firebase delete error:', e);
                    return null;
                }
            }
        };

        // ============================================================
        //  COMPOSANT DE CONNEXION
        // ============================================================
        function LoginScreen({ nonAutorise }) {
          const [email, setEmail]         = useState('');
          const [password, setPassword]   = useState('');
          const [erreur, setErreur]       = useState(nonAutorise ? 'Accès non autorisé pour cette adresse email.' : '');
          const [loading, setLoading]     = useState(false);
          const [resetMode, setResetMode] = useState(false);
          const [resetSent, setResetSent] = useState(false);

          const seConnecter = async (e) => {
            e.preventDefault();
            setErreur('');
            if (!EMAILS_AUTORISES.includes(email.trim().toLowerCase())) {
              setErreur('Accès non autorisé pour cette adresse email.');
              return;
            }
            setLoading(true);
            try {
              await auth.signInWithEmailAndPassword(email.trim(), password);
            } catch (err) {
              const messages = {
                'auth/user-not-found':    'Aucun compte trouvé pour cet email.',
                'auth/wrong-password':    'Mot de passe incorrect.',
                'auth/invalid-credential':'Email ou mot de passe incorrect.',
                'auth/invalid-email':     'Adresse email invalide.',
                'auth/too-many-requests': 'Trop de tentatives. Réessayez dans quelques minutes.',
              };
              setErreur(messages[err.code] || 'Erreur : ' + err.message);
            } finally {
              setLoading(false);
            }
          };

          const envoyerReset = async (e) => {
            e.preventDefault();
            setErreur('');
            if (!EMAILS_AUTORISES.includes(email.trim().toLowerCase())) {
              setErreur('Accès non autorisé pour cette adresse email.');
              return;
            }
            setLoading(true);
            try {
              await auth.sendPasswordResetEmail(email.trim());
              setResetSent(true);
            } catch (err) {
              setErreur('Erreur : ' + err.message);
            } finally {
              setLoading(false);
            }
          };

          return (
            <div className="min-h-screen bg-gray-900 flex items-center justify-center p-4">
              <div className="w-full max-w-md">
                <div className="text-center mb-8">
                  <div className="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl mb-4">
                    <svg className="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                      <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 11h.01M12 11h.01M15 11h.01M4 19h16a2 2 0 002-2V7a2 2 0 00-2-2H4a2 2 0 00-2 2v10a2 2 0 002 2z" />
                    </svg>
                  </div>
                  <h1 className="text-2xl font-bold text-white">🧮 LucA</h1>
                  <p className="text-gray-400 mt-1 text-sm">Accès réservé aux utilisateurs autorisés</p>
                </div>
                <div className="bg-gray-800 rounded-2xl border border-gray-700 p-8 shadow-xl">
                  {resetSent ? (
                    <div className="text-center">
                      <div className="w-12 h-12 bg-green-900/50 rounded-full flex items-center justify-center mx-auto mb-4">
                        <svg className="w-6 h-6 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M5 13l4 4L19 7" />
                        </svg>
                      </div>
                      <p className="text-green-400 font-semibold mb-2">Email envoyé !</p>
                      <p className="text-gray-400 text-sm mb-6">Vérifiez votre boîte mail pour réinitialiser votre mot de passe.</p>
                      <button onClick={() => { setResetMode(false); setResetSent(false); }} className="text-blue-400 hover:text-blue-300 text-sm">← Retour à la connexion</button>
                    </div>
                  ) : resetMode ? (
                    <form onSubmit={envoyerReset} className="space-y-5">
                      <div>
                        <h2 className="text-lg font-semibold text-gray-200 mb-1">Mot de passe oublié</h2>
                        <p className="text-sm text-gray-400 mb-4">Entrez votre email pour recevoir un lien de réinitialisation.</p>
                        <label className="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} required placeholder="vous@exemple.com"
                          className="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                      </div>
                      {erreur && <div className="p-3 bg-red-900/40 border border-red-700 text-red-300 rounded-lg text-sm">⚠️ {erreur}</div>}
                      <button type="submit" disabled={loading} className="w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 text-white font-semibold rounded-xl transition">
                        {loading ? 'Envoi...' : 'Envoyer le lien de réinitialisation'}
                      </button>
                      <button type="button" onClick={() => { setResetMode(false); setErreur(''); }} className="w-full text-center text-sm text-gray-400 hover:text-gray-200">← Retour à la connexion</button>
                    </form>
                  ) : (
                    <form onSubmit={seConnecter} className="space-y-5">
                      <div>
                        <label className="block text-sm font-medium text-gray-300 mb-2">Email</label>
                        <input type="email" value={email} onChange={e => setEmail(e.target.value)} required placeholder="vous@exemple.com"
                          className="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                      </div>
                      <div>
                        <label className="block text-sm font-medium text-gray-300 mb-2">Mot de passe</label>
                        <input type="password" value={password} onChange={e => setPassword(e.target.value)} required placeholder="••••••••"
                          className="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-xl text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                      </div>
                      {erreur && <div className="p-3 bg-red-900/40 border border-red-700 text-red-300 rounded-lg text-sm">⚠️ {erreur}</div>}
                      <button type="submit" disabled={loading} className="w-full py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-600 text-white font-semibold rounded-xl transition flex items-center justify-center gap-2">
                        {loading ? <><div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>Connexion...</> : '🔐 Se connecter'}
                      </button>
                      <div className="text-center">
                        <button type="button" onClick={() => { setResetMode(true); setErreur(''); }} className="text-sm text-gray-400 hover:text-blue-400 transition">
                          Mot de passe oublié ?
                        </button>
                      </div>
                    </form>
                  )}
                </div>
                <p className="text-center text-xs text-gray-600 mt-6">Accès restreint — Données chiffrées Firebase</p>
              </div>
            </div>
          );
        }

        // ============================================================
        //  WRAPPER D'AUTHENTIFICATION
        // ============================================================
        function App() {
          const [user, setUser]               = useState(undefined);
          const [nonAutorise, setNonAutorise] = useState(false);

          useEffect(() => {
            const unsub = auth.onAuthStateChanged(async (u) => {
              if (u) {
                if (EMAILS_AUTORISES.includes(u.email.toLowerCase())) {
                  setNonAutorise(false);
                  setUser(u);
                } else {
                  await auth.signOut();
                  setNonAutorise(true);
                  setUser(null);
                }
              } else {
                setUser(null);
              }
            });
            return unsub;
          }, []);

          if (user === undefined) {
            return (
              <div className="min-h-screen bg-gray-900 flex items-center justify-center">
                <div className="text-center">
                  <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-500 mx-auto mb-4"></div>
                  <p className="text-gray-400">Vérification de la session...</p>
                </div>
              </div>
            );
          }

          if (!user) return <LoginScreen nonAutorise={nonAutorise} />;
          return <AppComptable currentUser={user} onLogout={() => auth.signOut()} />;
        }

                // BUG CORRIGÉ : le solde débiteur/créditeur est calculé uniquement
                // à partir de la différence brute des mouvements (D - C),
                // indépendamment du type de compte.
                // Avant, gl.solde avait un signe inversé pour Passif/Produit,
                // ce qui plaçait le solde dans la mauvaise colonne.
                const rawSolde = gl.totalDebit - gl.totalCredit;
                return {
                  code,
                  nom: gl.nom,
                  type: gl.type,
                  mouvementDebit: gl.totalDebit,
                  mouvementCredit: gl.totalCredit,
                  soldeDebiteur:  rawSolde > 0 ?  rawSolde : 0,
                  soldeCrediteur: rawSolde < 0 ? -rawSolde : 0
                };
              })
              .sort((a, b) => a.code.localeCompare(b.code));
          };

          // Balance excluant les écritures de clôture (pour le compte de résultat)
          const calculerBalanceHorsClôture = () => {
            const glHC = {};
            Object.keys(comptes).forEach(code => {
              glHC[code] = {
                nom: comptes[code].nom,
                type: comptes[code].type,
                totalDebit: 0,
                totalCredit: 0,
              };
            });

            getEcrituresFiltrees()
              .filter(e => !e.numero.startsWith('CLOT-'))
              .forEach(ecriture => {
                ecriture.lignes.forEach(ligne => {
                  if (glHC[ligne.compte]) {
                    glHC[ligne.compte].totalDebit += ligne.debit;
                    glHC[ligne.compte].totalCredit += ligne.credit;
                  }
                });
              });

            return Object.entries(glHC)
              .filter(([_, gl]) => gl.totalDebit > 0 || gl.totalCredit > 0)
              .map(([code, gl]) => {
                const rawSolde = gl.totalDebit - gl.totalCredit;
                return {
                  code,
                  nom: gl.nom,
                  type: gl.type,
                  mouvementDebit: gl.totalDebit,
                  mouvementCredit: gl.totalCredit,
                  soldeDebiteur:  rawSolde > 0 ?  rawSolde : 0,
                  soldeCrediteur: rawSolde < 0 ? -rawSolde : 0
                };
              })
              .sort((a, b) => a.code.localeCompare(b.code));
          };

          // ══════════════════════════════════════════════════════════════
          //  MODULE GESTION COMMERCIALE — FACTURATION ÉLECTRONIQUE
          // ══════════════════════════════════════════════════════════════

          // ── Calculs facture ───────────────────────────────────────────
          const calculerTotauxFacture = (facture) => {
            const lignes = facture.lignes || [];
            let totalHT = 0;
            const tvaMap = {};
            lignes.forEach(l => {
              const ht = (parseFloat(l.quantite) || 0) * (parseFloat(l.prixUnitaire) || 0);
              totalHT += ht;
              const taux = parseFloat(l.tauxTva) || 0;
              if (!tvaMap[taux]) tvaMap[taux] = { taux, baseHT: 0, montantTva: 0 };
              tvaMap[taux].baseHT += ht;
              tvaMap[taux].montantTva += Math.round(ht * taux * 100) / 10000;
            });
            const tvaParTaux = Object.values(tvaMap).sort((a, b) => a.taux - b.taux);
            const totalTVA = tvaParTaux.reduce((s, t) => s + t.montantTva, 0);
            return { totalHT, totalTVA, totalTTC: totalHT + totalTVA, tvaParTaux };
          };

          const prochainNumeroFacture = (facturesRef) => {
            const f = facturesRef || factures;
            const annee = new Date().getFullYear();
            const factsAnnee = f.filter(x => x.type === 'facture' && x.numero && x.numero.startsWith(`F-${annee}-`));
            const max = factsAnnee.reduce((m, x) => { const n = parseInt((x.numero.split('-')[2]) || 0); return n > m ? n : m; }, 0);
            return `F-${annee}-${String(max + 1).padStart(3, '0')}`;
          };

          const prochainNumeroAvoir = (facturesRef) => {
            const f = facturesRef || factures;
            const annee = new Date().getFullYear();
            const avoirsAnnee = f.filter(x => x.type === 'avoir' && x.numero && x.numero.startsWith(`AV-${annee}-`));
            const max = avoirsAnnee.reduce((m, x) => { const n = parseInt((x.numero.split('-')[2]) || 0); return n > m ? n : m; }, 0);
            return `AV-${annee}-${String(max + 1).padStart(3, '0')}`;
          };

          const calculerEcheance = (dateEmission, condPaiement) => {
            if (!dateEmission) return '';
            const cond = condPaiement || paramsSociete.conditionsPaiement || '30 jours net';
            let jours = 30;
            const match = cond.match(/(\d+)\s*jours?/i);
            if (match) jours = parseInt(match[1]);
            const d = new Date(dateEmission); d.setDate(d.getDate() + jours);
            return d.toISOString().split('T')[0];
          };

          // ── Gestion lignes facture ─────────────────────────────────────
          const ajouterLigneFacture = () => {
            setFactureForm(f => ({ ...f, lignes: [...f.lignes, { description: '', quantite: 1, prixUnitaire: '', tauxTva: 20, compte: '706000' }] }));
          };
          const supprimerLigneFacture = (idx) => {
            if (factureForm.lignes.length <= 1) return;
            setFactureForm(f => ({ ...f, lignes: f.lignes.filter((_, i) => i !== idx) }));
          };
          const modifierLigneFacture = (idx, champ, val) => {
            setFactureForm(f => { const lignes = [...f.lignes]; lignes[idx] = { ...lignes[idx], [champ]: val }; return { ...f, lignes }; });
          };

          // ── Gestion tiers ─────────────────────────────────────────────
          const ajouterTier = () => {
            if (!tierForm.nom.trim()) { alert('Nom requis'); return; }
            const id = 'tier_' + Date.now();
            const nouveauxTiers = [...tiers, { id, ...tierForm }];
            setTiers(nouveauxTiers);
            sauvegarderTiers(nouveauxTiers);
            setShowTierForm(false);
            setTierForm(tierFormVide);
          };
          const modifierTierSave = () => {
            if (!tierForm.nom.trim()) { alert('Nom requis'); return; }
            const nouveauxTiers = tiers.map(t => t.id === editingTier ? { ...t, ...tierForm } : t);
            setTiers(nouveauxTiers);
            sauvegarderTiers(nouveauxTiers);
            setEditingTier(null); setShowTierForm(false); setTierForm(tierFormVide);
          };
          const supprimerTier = (id) => {
            if (!confirm('Supprimer ce tiers ?')) return;
            const nouveauxTiers = tiers.filter(t => t.id !== id);
            setTiers(nouveauxTiers);
            sauvegarderTiers(nouveauxTiers);
          };

          // ── Comptabilisation automatique ───────────────────────────────
          const comptabiliserFacture = async (facture, facturesActuelles) => {
            const tier = tiers.find(t => t.id === facture.tierId);
            const totaux = calculerTotauxFacture(facture);
            const isAvoir = facture.type === 'avoir';
            const compteClient = tier?.compteClient || '411000';
            const lignesEcr = [];

            // Vérifier/créer comptes TVA si besoin
            const comptesTVADefaut = { '20': '44571', '10': '44572', '5.5': '44573', '2.1': '44574' };
            const nomsTVADefaut = { '20': 'TVA collectée 20%', '10': 'TVA collectée 10%', '5.5': 'TVA collectée 5,5%', '2.1': 'TVA collectée 2,1%' };
            let nouveauxComptes = { ...comptes };
            let comptesModifies = false;
            totaux.tvaParTaux.forEach(({ taux }) => {
              const k = String(taux);
              if (comptesTVADefaut[k] && !nouveauxComptes[comptesTVADefaut[k]]) {
                nouveauxComptes[comptesTVADefaut[k]] = { nom: nomsTVADefaut[k] || `TVA ${taux}%`, type: 'Passif' };
                comptesModifies = true;
              }
            });
            if (comptesModifies) { setComptes(nouveauxComptes); await sauvegarderComptes(nouveauxComptes); }

            if (!isAvoir) {
              // Débit client TTC
              lignesEcr.push({ compte: compteClient, libelle: `Facture ${facture.numero} - ${tier?.nom || ''}`, debit: totaux.totalTTC, credit: 0 });
              // Crédit produits HT
              const htParCompte = {};
              facture.lignes.forEach(l => {
                if (!l.description || !l.prixUnitaire) return;
                const c = l.compte || '706000'; const ht = (parseFloat(l.quantite)||0)*(parseFloat(l.prixUnitaire)||0);
                htParCompte[c] = (htParCompte[c] || 0) + ht;
              });
              Object.entries(htParCompte).forEach(([c, m]) => { if (m > 0) lignesEcr.push({ compte: c, libelle: `Facture ${facture.numero}`, debit: 0, credit: m }); });
              // Crédit TVA
              totaux.tvaParTaux.forEach(({ taux, montantTva }) => {
                if (montantTva > 0) { const cTVA = comptesTVADefaut[String(taux)] || '444000'; lignesEcr.push({ compte: cTVA, libelle: `TVA ${taux}% - ${facture.numero}`, debit: 0, credit: montantTva }); }
              });
            } else {
              // AVOIR : inverse
              lignesEcr.push({ compte: compteClient, libelle: `Avoir ${facture.numero} - ${tier?.nom || ''}`, debit: 0, credit: totaux.totalTTC });
              const htParCompte = {};
              facture.lignes.forEach(l => {
                if (!l.description || !l.prixUnitaire) return;
                const c = l.compte || '706000'; const ht = (parseFloat(l.quantite)||0)*(parseFloat(l.prixUnitaire)||0);
                htParCompte[c] = (htParCompte[c] || 0) + ht;
              });
              Object.entries(htParCompte).forEach(([c, m]) => { if (m > 0) lignesEcr.push({ compte: c, libelle: `Avoir ${facture.numero}`, debit: m, credit: 0 }); });
              totaux.tvaParTaux.forEach(({ taux, montantTva }) => {
                if (montantTva > 0) { const cTVA = comptesTVADefaut[String(taux)] || '444000'; lignesEcr.push({ compte: cTVA, libelle: `TVA ${taux}% - ${facture.numero}`, debit: montantTva, credit: 0 }); }
              });
            }

            const ecritureId = Date.now();
            const nouvelleEcriture = {
              id: ecritureId, numero: `${isAvoir ? 'AV' : 'FAC'}-${facture.numero}`,
              date: facture.dateEmission, journal: 'VE',
              description: `${isAvoir ? 'Avoir' : 'Facture'} ${facture.numero} - ${tier?.nom || ''}`,
              lignes: lignesEcr
            };
            const nouvellesEcritures = [...ecritures, nouvelleEcriture];
            setEcritures(nouvellesEcritures);
            await sauvegarderEcritures(nouvellesEcritures);
            return ecritureId;
          };

          // ── Émission facture (nouvelle) ────────────────────────────────
          const emettreNouvelleFacture = async () => {
            if (!factureForm.tierId) { alert('Client requis'); return; }
            if (!factureForm.lignes.some(l => l.description && l.prixUnitaire)) { alert('Au moins une ligne complète requise'); return; }
            if (!confirm(`Émettre cette ${factureForm.type === 'avoir' ? "avoir" : "facture"} ?\n\nL'écriture comptable sera générée automatiquement.`)) return;
            const numero = factureForm.type === 'facture' ? prochainNumeroFacture() : prochainNumeroAvoir();
            const dateEmission = factureForm.dateEmission || new Date().toISOString().split('T')[0];
            const dateEcheance = factureForm.dateEcheance || calculerEcheance(dateEmission);
            const nouvelleFacture = { id: Date.now(), numero, ...factureForm, dateEmission, dateEcheance, statut: 'emise', dateCreation: new Date().toISOString() };
            const ecritureId = await comptabiliserFacture(nouvelleFacture);
            nouvelleFacture.ecritureId = ecritureId;
            const nouvelles = [...factures, nouvelleFacture];
            setFactures(nouvelles); await sauvegarderFactures(nouvelles);
            setFactureActive(nouvelleFacture); setFactureView('detail'); setFactureForm(factureFormVide);
            alert(`${factureForm.type === 'avoir' ? 'Avoir' : 'Facture'} ${numero} émis(e) ! Écriture comptable créée.`);
          };

          // ── Sauvegarder brouillon facture ──────────────────────────────
          const sauvegarderBrouillonFacture = async () => {
            if (!factureForm.tierId && !factureForm.lignes.some(l => l.description)) { alert('Ajoutez au minimum un client ou une ligne'); return; }
            const numero = factureForm.type === 'facture' ? prochainNumeroFacture() : prochainNumeroAvoir();
            const nouvelleFacture = { id: Date.now(), numero, ...factureForm, statut: 'brouillon', dateCreation: new Date().toISOString() };
            const nouvelles = [...factures, nouvelleFacture];
            setFactures(nouvelles); await sauvegarderFactures(nouvelles);
            setFactureView('list'); setFactureForm(factureFormVide);
            alert(`Brouillon ${numero} sauvegardé.`);
          };

          // ── Émettre brouillon existant ─────────────────────────────────
          const emettreFactureExistante = async (factureId) => {
            const facture = factures.find(f => f.id === factureId);
            if (!facture || !confirm(`Émettre ${facture.numero} ?\n\nL'écriture comptable sera générée automatiquement.`)) return;
            const ecritureId = await comptabiliserFacture(facture);
            const nouvelles = factures.map(f => f.id === factureId ? { ...f, statut: 'emise', ecritureId } : f);
            setFactures(nouvelles); await sauvegarderFactures(nouvelles);
            setFactureActive(nouvelles.find(f => f.id === factureId));
            alert(`Facture ${facture.numero} émise !`);
          };

          // ── Changer statut ─────────────────────────────────────────────
          const changerStatutFacture = async (factureId, nouveauStatut) => {
            const labels = { acceptee: 'acceptée', refusee: 'refusée', payee: 'payée', annulee: 'annulée' };
            if (!confirm(`Marquer cette facture comme ${labels[nouveauStatut] || nouveauStatut} ?`)) return;
            const nouvelles = factures.map(f => f.id === factureId ? { ...f, statut: nouveauStatut } : f);
            setFactures(nouvelles); await sauvegarderFactures(nouvelles);
            if (factureActive?.id === factureId) setFactureActive(nouvelles.find(f => f.id === factureId));
          };

          // ── Supprimer brouillon facture ────────────────────────────────
          const supprimerFacture = async (factureId) => {
            const f = factures.find(x => x.id === factureId);
            if (f?.statut !== 'brouillon') { alert('Seuls les brouillons peuvent être supprimés.'); return; }
            if (!confirm('Supprimer ce brouillon ?')) return;
            const nouvelles = factures.filter(x => x.id !== factureId);
            setFactures(nouvelles); await sauvegarderFactures(nouvelles);
            if (factureActive?.id === factureId) { setFactureView('list'); setFactureActive(null); }
          };

          // ── Générer avoir ──────────────────────────────────────────────
          const genererAvoir = async (factureOriginId) => {
            const facOrig = factures.find(f => f.id === factureOriginId);
            if (!facOrig || !confirm(`Générer un avoir pour ${facOrig.numero} ?`)) return;
            const numero = prochainNumeroAvoir();
            const avoir = {
              id: Date.now(), numero, type: 'avoir',
              refFactureOrigin: facOrig.numero, tierId: facOrig.tierId,
              dateEmission: new Date().toISOString().split('T')[0],
              dateEcheance: calculerEcheance(new Date().toISOString().split('T')[0]),
              dateLivraison: facOrig.dateLivraison || '',
              reference: `Avoir sur ${facOrig.numero}`, notes: facOrig.notes || '',
              lignes: facOrig.lignes.map(l => ({ ...l })),
              statut: 'emise', dateCreation: new Date().toISOString()
            };
            const ecritureId = await comptabiliserFacture(avoir);
            avoir.ecritureId = ecritureId;
            const nouvelles = [...factures, avoir];
            setFactures(nouvelles); await sauvegarderFactures(nouvelles);
            setFactureActive(avoir); setFactureView('detail');
            alert(`Avoir ${numero} généré et émis.`);
          };

          // ── PDF Facture (conforme mentions légales françaises) ─────────
          const genererPDFFacture = (facture) => {
            const doc = new jsPDF();
            const tier = tiers.find(t => t.id === facture.tierId);
            const totaux = calculerTotauxFacture(facture);
            const isAvoir = facture.type === 'avoir';
            const MG = 15;
            let y = 15;

            // ── Logo de la société ─────────────────────────────────────────
            if (paramsSociete.logo) {
              try {
                const logoSrc = paramsSociete.logo;
                let fmt = 'JPEG';
                if (logoSrc.includes('image/png'))  fmt = 'PNG';
                else if (logoSrc.includes('image/gif')) fmt = 'GIF';
                // Dimensionnement : max 45mm large, 22mm haut (aspect ratio préservé par jsPDF)
                doc.addImage(logoSrc, fmt, MG, 8, 45, 22, '', 'FAST');
                y = 34; // décaler le texte émetteur sous le logo
              } catch (logoErr) {
                console.warn('Logo PDF ignoré :', logoErr);
              }
            }

            // Émetteur
            doc.setFontSize(11); doc.setFont('helvetica', 'bold');
            doc.text(paramsSociete.raisonSociale || societes[societeActive], MG, y);
            doc.setFont('helvetica', 'normal'); doc.setFontSize(8); y += 5;
            if (paramsSociete.formeJuridique) { doc.text(`${paramsSociete.formeJuridique}${paramsSociete.capital ? ' — Capital : ' + paramsSociete.capital + ' €' : ''}`, MG, y); y += 4; }
            if (paramsSociete.adresse) { doc.text(paramsSociete.adresse, MG, y); y += 4; }
            if (paramsSociete.cp || paramsSociete.ville) { doc.text(`${paramsSociete.cp || ''} ${paramsSociete.ville || ''}`.trim(), MG, y); y += 4; }
            if (paramsSociete.siren) { doc.text(`SIREN : ${paramsSociete.siren}${paramsSociete.siret ? ' — SIRET : ' + paramsSociete.siret : ''}`, MG, y); y += 4; }
            if (paramsSociete.tvaNum) { doc.text(`N° TVA intracom. : ${paramsSociete.tvaNum}`, MG, y); y += 4; }
            if (paramsSociete.rcs) { doc.text(`RCS : ${paramsSociete.rcs}`, MG, y); y += 4; }
            if (paramsSociete.email) { doc.text(`${paramsSociete.email}${paramsSociete.telephone ? ' — Tél : ' + paramsSociete.telephone : ''}`, MG, y); y += 4; }

            // Titre
            doc.setFontSize(22); doc.setFont('helvetica', 'bold');
            doc.setTextColor(isAvoir ? 180 : 41, isAvoir ? 50 : 98, isAvoir ? 50 : 178);
            doc.text(isAvoir ? 'AVOIR' : 'FACTURE', 195, 22, { align: 'right' });
            doc.setTextColor(0,0,0); doc.setFontSize(10);
            doc.text(`N° ${facture.numero}`, 195, 30, { align: 'right' });
            doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
            doc.text(`Date d'émission : ${facture.dateEmission || ''}`, 195, 36, { align: 'right' });
            if (facture.dateLivraison) doc.text(`Date de livraison/prestation : ${facture.dateLivraison}`, 195, 41, { align: 'right' });
            if (facture.dateEcheance) { doc.setFont('helvetica', 'bold'); doc.text(`Échéance : ${facture.dateEcheance}`, 195, 46, { align: 'right' }); doc.setFont('helvetica', 'normal'); }
            if (isAvoir && facture.refFactureOrigin) { doc.setTextColor(180,50,50); doc.text(`Avoir sur facture n° ${facture.refFactureOrigin}`, 195, 51, { align: 'right' }); doc.setTextColor(0,0,0); }

            // Destinataire
            y = Math.max(y + 2, 62);
            doc.setFillColor(245, 247, 250); doc.rect(118, y - 4, 77, 38, 'F');
            doc.setFont('helvetica', 'bold'); doc.setFontSize(7);
            doc.text('FACTURER À :', 120, y); y += 5;
            if (tier) {
              doc.setFontSize(10); doc.setFont('helvetica', 'bold'); doc.text(tier.nom, 120, y); y += 5;
              doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
              if (tier.adresse) { doc.text(tier.adresse, 120, y); y += 4; }
              if (tier.cp || tier.ville) { doc.text(`${tier.cp || ''} ${tier.ville || ''}`.trim(), 120, y); y += 4; }
              if (tier.siren) { doc.text(`SIREN : ${tier.siren}`, 120, y); y += 4; }
              if (tier.tvaNum) { doc.text(`N° TVA : ${tier.tvaNum}`, 120, y); y += 4; }
            }

            // Référence
            y = Math.max(y, 110);
            if (facture.reference) { doc.setFontSize(9); doc.text(`Réf. commande / bon de commande : ${facture.reference}`, MG, y); y += 6; }

            // Table des lignes
            doc.autoTable({
              startY: y + 2,
              columns: [
                { header: 'Description', dataKey: 'desc' },
                { header: 'Qté', dataKey: 'qte' },
                { header: 'PU HT (€)', dataKey: 'pu' },
                { header: 'TVA %', dataKey: 'tva' },
                { header: 'Total HT (€)', dataKey: 'ht' }
              ],
              body: facture.lignes.filter(l => l.description || l.prixUnitaire).map(l => ({
                desc: l.description || '',
                qte: l.quantite || 1,
                pu: parseFloat(l.prixUnitaire || 0).toFixed(2),
                tva: `${l.tauxTva || 0} %`,
                ht: ((parseFloat(l.quantite)||0) * (parseFloat(l.prixUnitaire)||0)).toFixed(2)
              })),
              theme: 'striped',
              headStyles: { fillColor: isAvoir ? [180,50,50] : [41,98,178], textColor: 255, fontSize: 9, fontStyle: 'bold' },
              bodyStyles: { fontSize: 9 },
              columnStyles: { qte: { halign: 'right' }, pu: { halign: 'right' }, tva: { halign: 'right' }, ht: { halign: 'right' } },
              margin: { left: MG, right: 15 }
            });

            y = doc.lastAutoTable.finalY + 6;

            // Totaux
            const xT = 128;
            doc.setFontSize(9); doc.setFont('helvetica', 'normal');
            doc.text('Total HT :', xT, y); doc.text(`${totaux.totalHT.toFixed(2)} €`, 195, y, { align: 'right' }); y += 5;
            totaux.tvaParTaux.forEach(({ taux, baseHT, montantTva }) => {
              doc.text(`TVA ${taux}% (base ${baseHT.toFixed(2)} €) :`, xT, y);
              doc.text(`${montantTva.toFixed(2)} €`, 195, y, { align: 'right' }); y += 5;
            });
            doc.setFillColor(isAvoir ? 180 : 41, isAvoir ? 50 : 98, isAvoir ? 50 : 178);
            doc.rect(xT - 2, y - 1, 67, 9, 'F');
            doc.setTextColor(255,255,255); doc.setFont('helvetica', 'bold'); doc.setFontSize(11);
            doc.text('Total TTC :', xT, y + 6); doc.text(`${totaux.totalTTC.toFixed(2)} €`, 195, y + 6, { align: 'right' });
            doc.setTextColor(0,0,0); y += 16;

            // Coordonnées bancaires
            if (paramsSociete.iban && !isAvoir) {
              doc.setFont('helvetica', 'bold'); doc.setFontSize(9);
              doc.text('Règlement par virement :', MG, y); y += 4;
              doc.setFont('helvetica', 'normal'); doc.setFontSize(8);
              doc.text(`IBAN : ${paramsSociete.iban}`, MG, y); y += 4;
              if (paramsSociete.bic) { doc.text(`BIC : ${paramsSociete.bic}${paramsSociete.banque ? ' (' + paramsSociete.banque + ')' : ''}`, MG, y); y += 4; }
            }

            // Conditions
            y += 2;

                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4">
                          <input type="text" placeholder="Code 6 chiffres (ex: 625100)" value={newCompte.code} onChange={(e) => setNewCompte({...newCompte, code: e.target.value})} maxLength="6" className="px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                          <input type="text" placeholder="Nom du compte" value={newCompte.nom} onChange={(e) => setNewCompte({...newCompte, nom: e.target.value})} className="px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                          <select value={newCompte.type} onChange={(e) => setNewCompte({...newCompte, type: e.target.value})} className="px-4 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="Actif">Actif</option>
                            <option value="Passif">Passif</option>
                            <option value="Charge">Charge</option>
                            <option value="Produit">Produit</option>
                          </select>
                          <button onClick={ajouterCompte} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg flex items-center justify-center gap-2 transition">
                            <Plus />Ajouter
                          </button>
                        </div>
                      </div>
                      <div className="bg-gray-800 rounded-lg border border-gray-700 p-6">
                        <div className="flex items-center justify-between mb-4">
                          <h3 className="text-lg font-semibold text-gray-200">Plan comptable ({Object.keys(comptes).length} comptes)</h3>
                          <button onClick={reinitialiserComptes} className="text-sm text-gray-400 hover:text-gray-200 transition">Réinitialiser</button>
                        </div>
                        <div className="space-y-2 max-h-96 overflow-y-auto">
                          {Object.entries(comptes).sort((a, b) => a[0].localeCompare(b[0])).map(([code, info]) => (
                            <div key={code} className="bg-gray-700/50 border border-gray-600 rounded-lg p-3 hover:bg-gray-700 transition">
                              {editingCompte === code ? (
                                <div className="flex items-center gap-2">
                                  <span className="text-gray-400 font-mono text-sm w-20">{code}</span>
                                  <input type="text" defaultValue={info.nom} id={`edit-nom-${code}`} className="flex-1 px-3 py-1 bg-gray-600 border border-gray-500 rounded text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                  <select defaultValue={info.type} id={`edit-type-${code}`} className="px-3 py-1 bg-gray-600 border border-gray-500 rounded text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="Actif">Actif</option>
                                    <option value="Passif">Passif</option>
                                    <option value="Charge">Charge</option>
                                    <option value="Produit">Produit</option>
                                  </select>
                                  <button onClick={() => { const nom = document.getElementById(`edit-nom-${code}`).value; const type = document.getElementById(`edit-type-${code}`).value; modifierCompte(code, nom, type); }} className="p-2 bg-green-600 hover:bg-green-700 rounded transition"><Check /></button>
                                  <button onClick={() => setEditingCompte(null)} className="p-2 bg-gray-600 hover:bg-gray-500 rounded transition">✕</button>
                                </div>
                              ) : (
                                <div className="flex items-center justify-between">
                                  <div className="flex items-center gap-3 flex-1">
                                    <span className="text-gray-400 font-mono text-sm w-20">{code}</span>
                                    <span className="text-gray-200 flex-1">{info.nom}</span>
                                    <span className={`text-xs px-2 py-1 rounded ${info.type === 'Actif' ? 'bg-blue-900/50 text-blue-300' : info.type === 'Passif' ? 'bg-green-900/50 text-green-300' : info.type === 'Charge' ? 'bg-red-900/50 text-red-300' : 'bg-yellow-900/50 text-yellow-300'}`}>{info.type}</span>
                                  </div>
                                  <div className="flex items-center gap-2 ml-4">
                                    <button onClick={() => setEditingCompte(code)} className="p-2 text-blue-400 hover:text-blue-300 transition"><Edit /></button>
                                    <button onClick={() => supprimerCompte(code)} className="p-2 text-red-400 hover:text-red-300 transition"><Trash /></button>
                                  </div>
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              </div>

              {/* ══ MODAL ÉDITION SOCIÉTÉ ══════════════════════════════════ */}
              {editingSocieteId && (
                <div className="fixed inset-0 bg-black/75 z-[200] flex items-start justify-center overflow-y-auto p-4 py-8">
                  <div className="bg-gray-800 rounded-2xl border border-gray-600 w-full max-w-3xl shadow-2xl">

                    {/* Header */}
                    <div className="flex items-center justify-between px-6 py-4 border-b border-gray-700">
                      <div>
                        <h2 className="text-lg font-bold text-blue-400">✏️ Modifier la société</h2>
                        <p className="text-xs text-gray-400 mt-0.5">{societes[editingSocieteId]}{editingSocieteId === societeActive ? ' — société active' : ''}</p>
                      </div>
                      <button onClick={() => { setEditingSocieteId(null); setEditingSocieteForm(null); }}
                        className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-700 hover:bg-gray-600 text-gray-300 text-lg font-bold transition">✕</button>
                    </div>

                    {loadingEditSociete ? (
                      <div className="flex items-center justify-center py-16">
                        <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500 mr-3"></div>
                        <span className="text-gray-400">Chargement…</span>
                      </div>
                    ) : editingSocieteForm && (
                      <>
                        <div className="p-6 space-y-7 overflow-y-auto max-h-[72vh]">

                          {/* ── Nom & Identité juridique ── */}
                          <section>
                            <h3 className="text-sm font-bold text-blue-400 uppercase tracking-wider mb-3 flex items-center gap-2"><span>🏢</span> Identité juridique</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                              {[
                                ['nom',           'Nom affiché dans la liste *', 'text'],
                                ['raisonSociale', 'Raison sociale (sur factures) *', 'text'],
                                ['formeJuridique','Forme juridique', 'text'],
                                ['capital',       'Capital social (€)', 'text'],
                                ['siren',         'SIREN (9 chiffres)', 'text'],
                                ['siret',         'SIRET (14 chiffres)', 'text'],
                                ['tvaNum',        'N° TVA intracom.', 'text'],
                                ['rcs',           'RCS (ville)', 'text'],
                              ].map(([k, label, type]) => (
                                <div key={k}>
                                  <label className="block text-xs font-medium text-gray-400 mb-1">{label}</label>
                                  <input type={type} value={editingSocieteForm[k] || ''}
                                    onChange={e => setEditingSocieteForm(f => ({...f, [k]: e.target.value}))}
                                    className="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                              ))}
                            </div>
                          </section>

                          {/* ── Coordonnées ── */}
                          <section>
                            <h3 className="text-sm font-bold text-blue-400 uppercase tracking-wider mb-3 flex items-center gap-2"><span>📍</span> Coordonnées</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                              {[
                                ['adresse',   'Adresse', 'text'],
                                ['cp',        'Code postal', 'text'],
                                ['ville',     'Ville', 'text'],
                                ['pays',      'Pays', 'text'],
                                ['email',     'Email', 'email'],
                                ['telephone', 'Téléphone', 'text'],
                              ].map(([k, label, type]) => (
                                <div key={k}>
                                  <label className="block text-xs font-medium text-gray-400 mb-1">{label}</label>
                                  <input type={type} value={editingSocieteForm[k] || ''}
                                    onChange={e => setEditingSocieteForm(f => ({...f, [k]: e.target.value}))}
                                    className="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                              ))}
                            </div>
                          </section>

                          {/* ── Bancaire ── */}
                          <section>
                            <h3 className="text-sm font-bold text-blue-400 uppercase tracking-wider mb-3 flex items-center gap-2"><span>🏦</span> Informations bancaires</h3>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                              {[
                                ['iban',   'IBAN'],
                                ['bic',    'BIC'],
                                ['banque', 'Banque'],
                              ].map(([k, label]) => (
                                <div key={k}>
                                  <label className="block text-xs font-medium text-gray-400 mb-1">{label}</label>
                                  <input type="text" value={editingSocieteForm[k] || ''}
                                    onChange={e => setEditingSocieteForm(f => ({...f, [k]: e.target.value}))}
                                    className="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                              ))}
                            </div>
                          </section>

                          {/* ── Conditions de facturation ── */}
                          <section>
                            <h3 className="text-sm font-bold text-blue-400 uppercase tracking-wider mb-3 flex items-center gap-2"><span>📄</span> Conditions de facturation</h3>
                            <div className="space-y-3">
                              {[
                                ['conditionsPaiement', 'Conditions de paiement',  'Ex : 30 jours net, fin de mois'],
                                ['penalitesRetard',    'Pénalités de retard',      "Ex : Triple du taux d'intérêt légal"],
                                ['escompte',           'Escompte',                 'Ex : Aucun escompte pour règlement anticipé'],
                              ].map(([k, label, ph]) => (
                                <div key={k}>
                                  <label className="block text-xs font-medium text-gray-400 mb-1">{label}</label>
                                  <input type="text" value={editingSocieteForm[k] || ''} placeholder={ph}
                                    onChange={e => setEditingSocieteForm(f => ({...f, [k]: e.target.value}))}
                                    className="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                                </div>
                              ))}
                              <div>
                                <label className="block text-xs font-medium text-gray-400 mb-1">Mentions légales additionnelles (pied de page)</label>
                                <textarea rows="2" value={editingSocieteForm.mentionsLegales || ''}
                                  onChange={e => setEditingSocieteForm(f => ({...f, mentionsLegales: e.target.value}))}
                                  className="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-lg text-gray-100 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none" />
                              </div>
                            </div>
                          </section>

                          {/* ── Logo ── */}
                          <section>
                            <h3 className="text-sm font-bold text-blue-400 uppercase tracking-wider mb-3 flex items-center gap-2"><span>🖼️</span> Logo</h3>
                            <div className="flex items-center gap-5 flex-wrap">
                              {editingSocieteForm.logo ? (
                                <div className="relative flex-shrink-0">
                                  <div className="bg-white rounded-lg p-2 border border-gray-600" style={{maxWidth:'200px'}}>
                                    <img src={editingSocieteForm.logo} alt="Logo" className="max-h-24 max-w-full object-contain mx-auto block" />
                                  </div>
                                  <button onClick={() => setEditingSocieteForm(f => ({...f, logo: ''}))}
                                    className="absolute -top-2 -right-2 w-6 h-6 bg-red-600 hover:bg-red-500 rounded-full flex items-center justify-center text-white text-xs font-bold shadow">✕</button>
                                </div>
                              ) : (
                                <div className="flex-shrink-0 w-40 h-24 rounded-lg border-2 border-dashed border-gray-600 flex items-center justify-center text-gray-500 text-xs text-center px-3">
                                  Aucun logo
                                </div>
                              )}
                              <div className="space-y-2">
                                <label className="flex items-center gap-2 px-4 py-2 bg-gray-700 hover:bg-gray-600 border border-gray-600 rounded-lg cursor-pointer text-sm text-gray-300 transition">
                                  <Upload /> {editingSocieteForm.logo ? 'Remplacer le logo' : 'Télécharger un logo'}
                                  <input type="file" accept="image/png,image/jpeg,image/gif,image/webp" className="hidden"
                                    onChange={e => {
                                      const file = e.target.files[0];
                                      if (!file) return;
                                      if (file.size > 800000) { alert('Le logo ne doit pas dépasser 800 Ko'); return; }
                                      const reader = new FileReader();
                                      reader.onload = ev => setEditingSocieteForm(f => ({...f, logo: ev.target.result}));
                                      reader.readAsDataURL(file);
                                      e.target.value = '';
                                    }} />
                                </label>
                                <p className="text-xs text-gray-500">PNG, JPG, GIF ou WebP — max 800 Ko</p>
                              </div>
                            </div>
                          </section>

                        </div>

                        {/* Footer boutons */}
                        <div className="px-6 py-4 border-t border-gray-700 flex items-center justify-between gap-3 flex-wrap">
                          <p className="text-xs text-gray-500">Les modifications seront appliquées immédiatement{editingSocieteId === societeActive ? ' à la société active.' : '.'}</p>
                          <div className="flex gap-3">
                            <button onClick={() => { setEditingSocieteId(null); setEditingSocieteForm(null); }}
                              className="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-sm text-gray-300 transition">
                              Annuler
                            </button>
                            <button onClick={sauvegarderEditionSociete}
                              className="flex items-center gap-2 px-6 py-2 bg-blue-600 hover:bg-blue-700 rounded-lg text-sm font-semibold transition">
                              <Save /> Enregistrer
                            </button>
                          </div>
                        </div>
                      </>
                    )}
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
